<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="1000" height="220" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Dungeon Escape Wordmark</title>
  <desc id="logo-desc">Text-only wordmark reading DUNGEON ESCAPE in a torchlit gold gradient with iron outline.</desc>

  <defs>
    <linearGradient id="emberFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE3A8"/>
      <stop offset="35%" stop-color="#F2A93B"/>
      <stop offset="70%" stop-color="#C9651B"/>
      <stop offset="100%" stop-color="#7A2E0E"/>
    </linearGradient>

    <linearGradient id="ironStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2a1c"/>
      <stop offset="100%" stop-color="#120a06"/>
    </linearGradient>

    <linearGradient id="subFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E9C98C"/>
      <stop offset="100%" stop-color="#9C6B33"/>
    </linearGradient>

    <linearGradient id="ringMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4D9A0"/>
      <stop offset="45%" stop-color="#8A5A2A"/>
      <stop offset="100%" stop-color="#2A1608"/>
    </linearGradient>

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <style>
      .crack { fill: none; stroke: #1a0f08; stroke-width: 2; stroke-linecap: round; opacity: 0.55; }
    </style>
  </defs>

  <!-- ============ MAIN WORDMARK: DUNGEON ============ -->
  <g filter="url(#textShadow)">
    <text x="500" y="115" text-anchor="middle"
          font-family="Cinzel, 'Trajan Pro', Georgia, 'Times New Roman', serif"
          font-size="118" font-weight="700" letter-spacing="14"
          fill="url(#emberFill)" stroke="url(#ironStroke)" stroke-width="2.5"
          paint-order="stroke fill">
      DUNGEON
    </text>
  </g>

  <!-- weathered crack texture overlay across the wordmark -->
  <g class="crack">
    <path d="M120,85 q40,-12 70,4 t60,-8"/>
    <path d="M610,70 q30,-18 55,2 t75,-6"/>
    <path d="M250,132 q20,8 45,-2"/>
  </g>

  <!-- decorative side flourish lines flanking the title -->
  <g stroke="url(#ringMetal)" stroke-width="3" opacity="0.85">
    <line x1="60" y1="90" x2="170" y2="90"/>
    <line x1="830" y1="90" x2="940" y2="90"/>
    <circle cx="50" cy="90" r="6" fill="url(#ringMetal)" stroke="none"/>
    <circle cx="950" cy="90" r="6" fill="url(#ringMetal)" stroke="none"/>
  </g>

  <!-- thin separator rule -->
  <rect x="260" y="142" width="480" height="3" rx="1.5" fill="url(#subFill)" opacity="0.85"/>

  <!-- ============ SUBTITLE: ESCAPE ============ -->
  <text x="500" y="192" text-anchor="middle"
        font-family="Cinzel, 'Trajan Pro', Georgia, serif"
        font-size="46" font-weight="600" letter-spacing="20"
        fill="url(#subFill)" stroke="#1a0f08" stroke-width="1"
        paint-order="stroke fill">
    E S C A P E
  </text>
</svg>
