<svg width="480" height="200" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff2ee6"/><stop offset="100%" stop-color="#4facfe"/>
  </linearGradient>
  <clipPath id="cardclip"><rect x="0" y="0" width="480" height="200" rx="16"/></clipPath>
  
</defs>
<g clip-path="url(#cardclip)">
  <rect x="0" y="0" width="480" height="200" fill="#160726"/>
  <rect x="0" y="0" width="480" height="200" fill="none" stroke="#8a2be2" stroke-width="2"/>
  
    <circle cx="100" cy="100" r="62" fill="none" stroke="#2a1440" stroke-width="12"/>
    <circle cx="100" cy="100" r="62" fill="none" stroke="url(#ringGrad)" stroke-width="12"
            stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6"
            transform="rotate(-90 100 100)">
      <animate attributeName="stroke-dashoffset" from="389.6" to="85.7" dur="1.6s" begin="0.2s" fill="freeze"/>
    </circle>
    <text x="100" y="96" text-anchor="middle" font-family="'Fira Code',monospace" font-size="26" font-weight="bold" fill="#f5eaff">A+</text>
    <text x="100" y="118" text-anchor="middle" font-family="'Fira Code',monospace" font-size="11" fill="#c9b6e8">rank</text><text x="220" y="24" font-family="'Fira Code',monospace" font-size="13" fill="#c9b6e8" letter-spacing="1">GITHUB STATS &#183; update as you grow</text>
    <g opacity="0" transform="translate(-30,0)">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.3s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-30,0;0,0" dur="0.5s" begin="0.3s" fill="freeze"/>
      <text x="220" y="46" font-family="'Fira Code',monospace" font-size="14" fill="#c9b6e8">Commits (last year)</text>
      <text x="440" y="46" text-anchor="end" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#ff2ee6">600+</text>
      <rect x="220" y="54" width="220" height="3" rx="1.5" fill="#2a1440"/>
    </g>
    <g opacity="0" transform="translate(-30,0)">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.44999999999999996s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-30,0;0,0" dur="0.5s" begin="0.44999999999999996s" fill="freeze"/>
      <text x="220" y="92" font-family="'Fira Code',monospace" font-size="14" fill="#c9b6e8">Repositories</text>
      <text x="440" y="92" text-anchor="end" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#ff2ee6">12</text>
      <rect x="220" y="100" width="220" height="3" rx="1.5" fill="#2a1440"/>
    </g>
    <g opacity="0" transform="translate(-30,0)">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-30,0;0,0" dur="0.5s" begin="0.6s" fill="freeze"/>
      <text x="220" y="138" font-family="'Fira Code',monospace" font-size="14" fill="#c9b6e8">Solo Projects Shipped</text>
      <text x="440" y="138" text-anchor="end" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#ff2ee6">3</text>
      <rect x="220" y="146" width="220" height="3" rx="1.5" fill="#2a1440"/>
    </g>
</g>
</svg>