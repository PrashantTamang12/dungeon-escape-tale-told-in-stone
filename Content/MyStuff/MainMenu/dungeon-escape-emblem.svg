<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">Dungeon Escape Emblem</title>
  <desc id="icon-desc">A broken iron chain flanking an ornate keyhole medallion, lit with warm torchlight gold.</desc>

  <defs>
    <linearGradient id="emberFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE3A8"/>
      <stop offset="35%" stop-color="#F2A93B"/>
      <stop offset="70%" stop-color="#C9651B"/>
      <stop offset="100%" stop-color="#7A2E0E"/>
    </linearGradient>

    <linearGradient id="ringMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4D9A0"/>
      <stop offset="45%" stop-color="#8A5A2A"/>
      <stop offset="100%" stop-color="#2A1608"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFD27A" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FF8A2B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ambient torch glow behind the emblem -->
  <ellipse cx="200" cy="80" rx="180" ry="78" fill="url(#glow)"/>

  <g transform="translate(200,80)">
    <!-- chain links, left side -->
    <g stroke="url(#ringMetal)" stroke-width="7" fill="none" opacity="0.95">
      <ellipse cx="-150" cy="-6" rx="20" ry="13" transform="rotate(-18 -150 -6)"/>
      <ellipse cx="-112" cy="6" rx="20" ry="13" transform="rotate(15 -112 6)"/>
      <ellipse cx="-76" cy="-4" rx="18" ry="12" transform="rotate(-12 -76 -4)"/>
      <!-- broken link -->
      <path d="M -46,-2 L -34,-14" stroke-linecap="round"/>
      <path d="M -40,12 L -28,2" stroke-linecap="round"/>
    </g>

    <!-- chain links, right side -->
    <g stroke="url(#ringMetal)" stroke-width="7" fill="none" opacity="0.95">
      <ellipse cx="150" cy="-6" rx="20" ry="13" transform="rotate(18 150 -6)"/>
      <ellipse cx="112" cy="6" rx="20" ry="13" transform="rotate(-15 112 6)"/>
      <ellipse cx="76" cy="-4" rx="18" ry="12" transform="rotate(12 76 -4)"/>
      <path d="M 46,-2 L 34,-14" stroke-linecap="round"/>
      <path d="M 40,12 L 28,2" stroke-linecap="round"/>
    </g>

    <!-- ornate keyhole medallion, center -->
    <g>
      <circle cx="0" cy="0" r="34" fill="#160B05" stroke="url(#ringMetal)" stroke-width="4"/>
      <circle cx="0" cy="0" r="34" fill="none" stroke="#000" stroke-width="1" opacity="0.4"/>
      <path d="M0,-13 a13,13 0 1,0 0.01,0 Z M -6,5 L 6,5 L 9,24 L -9,24 Z" fill="url(#emberFill)"/>
    </g>
  </g>
</svg>
